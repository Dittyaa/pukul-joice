<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>PUKUL JOICE 🔨</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #1a0533;
    --purple: #6a0dad;
    --pink: #ff2d8f;
    --yellow: #ffe600;
    --orange: #ff6b00;
    --white: #ffffff;
    --combo-glow: 0 0 30px #ff2d8f, 0 0 60px #ff2d8f88;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    font-family: 'Nunito', sans-serif;
    min-height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    user-select: none;
  }

  /* Animated BG */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 20% 20%, #6a0dad55 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, #ff2d8f33 0%, transparent 60%),
                radial-gradient(ellipse at 50% 50%, #1a053388 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* ===== HEADER ===== */
  header {
    width: 100%;
    max-width: 480px;
    padding: 14px 20px 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: relative;
    z-index: 10;
  }

  .score-box {
    background: rgba(255,255,255,0.08);
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 16px;
    padding: 6px 16px;
    text-align: center;
    backdrop-filter: blur(6px);
  }

  .score-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: #ccc;
    text-transform: uppercase;
  }

  .score-value {
    font-family: 'Bangers', cursive;
    font-size: 28px;
    color: var(--yellow);
    letter-spacing: 1px;
    line-height: 1;
    text-shadow: 0 0 12px #ffe60088;
    transition: transform 0.1s;
  }

  .score-value.bump { transform: scale(1.4); }

  .title-area { text-align: center; }
  .title-area h1 {
    font-family: 'Bangers', cursive;
    font-size: clamp(26px, 7vw, 38px);
    color: var(--white);
    letter-spacing: 3px;
    text-shadow: 3px 3px 0 var(--pink), 6px 6px 0 #6a0dad;
    line-height: 1;
  }
  .title-area small {
    font-size: 11px;
    color: #ff2d8fcc;
    letter-spacing: 1px;
  }

  /* ===== HIT COUNTER ===== */
  .hit-badge {
    background: var(--orange);
    border-radius: 50%;
    width: 60px;
    height: 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 20px #ff6b0099;
    font-family: 'Bangers', cursive;
    position: relative;
    z-index: 10;
  }
  .hit-badge .hit-num { font-size: 22px; color: #fff; line-height: 1; }
  .hit-badge .hit-lbl { font-size: 10px; color: #fff; letter-spacing: 1px; }

  /* ===== GAME AREA ===== */
  #game-area {
    flex: 1;
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 5;
    padding: 0 20px;
    cursor: none;
  }

  /* Face container */
  #face-container {
    position: relative;
    width: clamp(180px, 50vw, 240px);
    height: clamp(180px, 50vw, 240px);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #face-container.shake {
    animation: shakeIt 0.25s ease;
  }

  @keyframes shakeIt {
    0%   { transform: rotate(0deg) scale(1); }
    20%  { transform: rotate(-8deg) scale(0.94); }
    40%  { transform: rotate(8deg) scale(1.06); }
    60%  { transform: rotate(-5deg) scale(0.97); }
    80%  { transform: rotate(5deg) scale(1.03); }
    100% { transform: rotate(0deg) scale(1); }
  }

  #face-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
    border: 4px solid var(--pink);
    box-shadow: 0 0 40px #ff2d8f88, 0 0 80px #6a0dad66;
    pointer-events: none;
    display: block;
  }

  /* Dummy face (shown when no real image) */
  #face-dummy {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    border: 4px solid var(--pink);
    box-shadow: 0 0 40px #ff2d8f88;
    background: linear-gradient(135deg, #f5c6a0, #e8956b, #c46b3a);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 800;
    color: rgba(255,255,255,0.8);
    text-align: center;
    padding: 20px;
    letter-spacing: 0.5px;
    line-height: 1.5;
    pointer-events: none;
  }
  #face-dummy .dummy-icon { font-size: 52px; margin-bottom: 8px; }

  /* Pulsing ring */
  #face-container::after {
    content: '';
    position: absolute;
    inset: -10px;
    border-radius: 50%;
    border: 3px solid var(--pink);
    opacity: 0;
    animation: pulseRing 2s infinite;
  }

  @keyframes pulseRing {
    0%   { transform: scale(1); opacity: 0.7; }
    100% { transform: scale(1.35); opacity: 0; }
  }

  /* ===== HAMMER CURSOR ===== */
  #hammer {
    position: fixed;
    width: 70px;
    height: 70px;
    pointer-events: none;
    z-index: 999;
    transform: translate(-20%, -80%) rotate(-30deg);
    transform-origin: 85% 85%;
    transition: transform 0.05s ease;
    font-size: 56px;
    line-height: 1;
    text-align: center;
    filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.5));
  }

  #hammer.swing {
    animation: hammerSwing 0.22s ease-out;
  }

  @keyframes hammerSwing {
    0%   { transform: translate(-20%, -80%) rotate(-30deg); }
    40%  { transform: translate(-20%, -80%) rotate(30deg) scale(1.1); }
    70%  { transform: translate(-20%, -80%) rotate(5deg); }
    100% { transform: translate(-20%, -80%) rotate(-30deg); }
  }

  /* ===== COMBO BANNER ===== */
  #combo-banner {
    margin-top: 20px;
    font-family: 'Bangers', cursive;
    font-size: clamp(24px, 8vw, 36px);
    letter-spacing: 3px;
    color: var(--yellow);
    text-shadow: var(--combo-glow);
    opacity: 0;
    transform: scale(0.6);
    transition: opacity 0.2s, transform 0.2s;
    height: 50px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #combo-banner.show {
    opacity: 1;
    transform: scale(1);
    animation: comboBounce 0.3s ease;
  }
  @keyframes comboBounce {
    0%   { transform: scale(0.5); }
    60%  { transform: scale(1.2); }
    100% { transform: scale(1); }
  }

  /* ===== FLOATING SCORE PARTICLES ===== */
  .float-score {
    position: fixed;
    font-family: 'Bangers', cursive;
    font-size: 26px;
    font-weight: 900;
    color: var(--yellow);
    text-shadow: 1px 1px 0 #000, -1px -1px 0 #000;
    pointer-events: none;
    z-index: 900;
    animation: floatUp 0.9s ease-out forwards;
  }
  @keyframes floatUp {
    0%   { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-80px) scale(1.4); }
  }

  /* ===== CONFETTI ===== */
  .confetti-piece {
    position: fixed;
    width: 9px;
    height: 9px;
    pointer-events: none;
    z-index: 800;
    border-radius: 2px;
    animation: confettiFly var(--dur) ease-out forwards;
  }
  @keyframes confettiFly {
    0%   { opacity: 1; transform: translate(0,0) rotate(0deg) scale(1); }
    100% { opacity: 0; transform: translate(var(--dx), var(--dy)) rotate(var(--rot)) scale(0.4); }
  }

  /* ===== STARS ===== */
  .star-pop {
    position: fixed;
    pointer-events: none;
    z-index: 850;
    font-size: 22px;
    animation: starPop 0.7s ease-out forwards;
  }
  @keyframes starPop {
    0%   { opacity: 1; transform: translate(0,0) scale(1); }
    100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0.2); }
  }

  /* ===== BOTTOM BAR ===== */
  footer {
    width: 100%;
    max-width: 480px;
    padding: 10px 20px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: relative;
    z-index: 10;
  }

  .streak-area {
    display: flex;
    gap: 5px;
    align-items: center;
  }
  .streak-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    border: 2px solid rgba(255,255,255,0.2);
    transition: all 0.15s;
  }
  .streak-dot.lit {
    background: var(--yellow);
    border-color: var(--orange);
    box-shadow: 0 0 8px var(--yellow);
  }

  .reset-btn {
    background: rgba(255,45,143,0.15);
    border: 2px solid var(--pink);
    color: var(--pink);
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 13px;
    padding: 8px 18px;
    border-radius: 50px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
  }
  .reset-btn:hover, .reset-btn:active {
    background: var(--pink);
    color: #fff;
    box-shadow: 0 0 20px var(--pink);
  }

  /* Tap hint */
  #tap-hint {
    position: absolute;
    bottom: 90px;
    font-size: 13px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 1px;
    animation: blinkHint 2s infinite;
    pointer-events: none;
  }
  @keyframes blinkHint {
    0%, 100% { opacity: 0.4; }
    50%       { opacity: 0.9; }
  }

  /* ===== RESPONSIVE ===== */
  @media (hover: none) {
    #hammer { display: none; }
    body { cursor: default; }
    #game-area { cursor: pointer; }
  }

  /* High score flash */
  .highscore-flash {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Bangers', cursive;
    font-size: 52px;
    color: var(--yellow);
    text-shadow: 4px 4px 0 var(--pink), 0 0 40px #ffe600;
    z-index: 999;
    letter-spacing: 4px;
    animation: hsBoom 1.5s ease-out forwards;
    pointer-events: none;
  }
  @keyframes hsBoom {
    0%   { opacity: 0; transform: translate(-50%,-50%) scale(0.3); }
    30%  { opacity: 1; transform: translate(-50%,-50%) scale(1.2); }
    60%  { opacity: 1; transform: translate(-50%,-50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%,-50%) scale(0.8); }
  }
</style>
</head>
<body>

<!-- Hammer cursor (desktop) -->
<div id="hammer">🔨</div>

<!-- Header -->
<header>
  <div class="score-box">
    <div class="score-label">Score</div>
    <div class="score-value" id="score">0</div>
  </div>

  <div class="title-area">
    <h1>PUKUL<br>JOICE</h1>
    <small>💥 TAP TO SMASH 💥</small>
  </div>

  <div class="hit-badge">
    <span class="hit-num" id="hit-count">0</span>
    <span class="hit-lbl">HIT</span>
  </div>
</header>

<!-- Game Area -->
<div id="game-area">
  <div id="face-container">
    <img id="face-img" src="img/jois_2.jpeg" alt="Joice" />

  </div>

  <div id="combo-banner">⚡ <span id="combo-text">5x COMBO!</span> ⚡</div>
  <div id="tap-hint">👆 TAP / KLIK UNTUK PUKUL</div>
</div>

<!-- Footer -->
<footer>
  <div class="streak-area" id="streak-dots"></div>
  <div class="score-box" style="flex:1; margin: 0 12px; text-align:center;">
    <div class="score-label">Best</div>
    <div class="score-value" id="best-score" style="font-size:20px; color:#ffe600;">0</div>
  </div>
  <button class="reset-btn" onclick="resetGame()">🔄 RESET</button>
</footer>

<script>
// ===== STATE =====
let score = 0;
let hits = 0;
let combo = 0;
let maxCombo = 5; // combo threshold to show banner
let bestScore = parseInt(localStorage.getItem('pukul_best') || '0');
let comboTimeout = null;
let hideTapHint = false;

const COLORS = ['#ff2d8f','#ffe600','#00e5ff','#ff6b00','#a855f7','#22d3ee','#f97316','#ec4899'];
const SHAPES = ['■','◆','●','▲','★'];

// Init
document.getElementById('best-score').textContent = bestScore;
buildStreakDots();

// ===== STREAK DOTS =====
function buildStreakDots() {
  const container = document.getElementById('streak-dots');
  container.innerHTML = '';
  for (let i = 0; i < 10; i++) {
    const d = document.createElement('div');
    d.className = 'streak-dot' + (i < combo ? ' lit' : '');
    container.appendChild(d);
  }
}

// ===== HAMMER FOLLOW (desktop) =====
document.addEventListener('mousemove', e => {
  const h = document.getElementById('hammer');
  h.style.left = e.clientX + 'px';
  h.style.top  = e.clientY + 'px';
});

// ===== HIT HANDLER =====
function doHit(x, y) {
  if (!hideTapHint) {
    document.getElementById('tap-hint').style.display = 'none';
    hideTapHint = true;
  }

  hits++;
  combo++;

  // Combo decay reset
  clearTimeout(comboTimeout);
  comboTimeout = setTimeout(() => {
    combo = 0;
    buildStreakDots();
    hideComboBanner();
  }, 1800);

  // Score calculation
  let multiplier = 1;
  if (combo >= 50) multiplier = 10;
  else if (combo >= 30) multiplier = 7;
  else if (combo >= 20) multiplier = 5;
  else if (combo >= 10) multiplier = 3;
  else if (combo >= 5)  multiplier = 2;

  const gained = 10 * multiplier;
  score += gained;

  // Update UI
  document.getElementById('hit-count').textContent = hits;
  const sv = document.getElementById('score');
  sv.textContent = score;
  sv.classList.remove('bump');
  void sv.offsetWidth;
  sv.classList.add('bump');
  setTimeout(() => sv.classList.remove('bump'), 150);

  // Best score
  if (score > bestScore) {
    bestScore = score;
    localStorage.setItem('pukul_best', bestScore);
    document.getElementById('best-score').textContent = bestScore;
    if (score > 0 && score % 500 === 0) showHighscoreFlash();
  }

  // Shake face
  const fc = document.getElementById('face-container');
  fc.classList.remove('shake');
  void fc.offsetWidth;
  fc.classList.add('shake');
  setTimeout(() => fc.classList.remove('shake'), 260);

  // Swing hammer
  const hm = document.getElementById('hammer');
  hm.classList.remove('swing');
  void hm.offsetWidth;
  hm.classList.add('swing');
  setTimeout(() => hm.classList.remove('swing'), 230);

  // Floating score
  spawnFloatScore(x, y, '+' + gained);

  // Confetti burst
  spawnConfetti(x, y, combo >= 10 ? 18 : 10);

  // Stars
  if (combo % 5 === 0 && combo > 0) spawnStars(x, y);

  // Combo banner
  if (combo >= maxCombo) {
    const text = combo >= 50 ? '🔥 ' + combo + 'x ULTRA COMBO! 🔥'
                : combo >= 20 ? '⚡ ' + combo + 'x MEGA COMBO! ⚡'
                : '⚡ ' + combo + 'x COMBO! ⚡';
    showComboBanner(text);
  }

  buildStreakDots();
}

// ===== FLOATING SCORE =====
function spawnFloatScore(x, y, text) {
  const el = document.createElement('div');
  el.className = 'float-score';
  el.textContent = text;
  el.style.left = (x - 15) + 'px';
  el.style.top  = (y - 20) + 'px';
  el.style.color = combo >= 10 ? '#ffe600' : (combo >= 5 ? '#ff6b00' : '#ffffff');
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 950);
}

// ===== CONFETTI =====
function spawnConfetti(cx, cy, count) {
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    const color = COLORS[Math.floor(Math.random() * COLORS.length)];
    el.style.background = color;
    el.style.left = cx + 'px';
    el.style.top  = cy + 'px';
    const angle = (Math.random() * 360) * Math.PI / 180;
    const dist  = 40 + Math.random() * 80;
    const dx = Math.cos(angle) * dist;
    const dy = Math.sin(angle) * dist;
    el.style.setProperty('--dx', dx + 'px');
    el.style.setProperty('--dy', dy + 'px');
    el.style.setProperty('--rot', (Math.random() * 720 - 360) + 'deg');
    el.style.setProperty('--dur', (0.4 + Math.random() * 0.5) + 's');
    if (Math.random() > 0.5) { el.style.width = '6px'; el.style.height = '12px'; }
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1000);
  }
}

// ===== STARS =====
function spawnStars(cx, cy) {
  const starEmojis = ['⭐','✨','💥','🌟'];
  for (let i = 0; i < 5; i++) {
    const el = document.createElement('div');
    el.className = 'star-pop';
    el.textContent = starEmojis[Math.floor(Math.random() * starEmojis.length)];
    el.style.left = cx + 'px';
    el.style.top  = cy + 'px';
    const angle = (Math.random() * 360) * Math.PI / 180;
    const dist  = 50 + Math.random() * 70;
    el.style.setProperty('--dx', (Math.cos(angle) * dist) + 'px');
    el.style.setProperty('--dy', (Math.sin(angle) * dist) + 'px');
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 750);
  }
}

// ===== COMBO BANNER =====
function showComboBanner(text) {
  const banner = document.getElementById('combo-banner');
  document.getElementById('combo-text').textContent = text;
  banner.classList.add('show');
}
function hideComboBanner() {
  document.getElementById('combo-banner').classList.remove('show');
}

// ===== HIGHSCORE FLASH =====
function showHighscoreFlash() {
  const el = document.createElement('div');
  el.className = 'highscore-flash';
  el.textContent = '🏆 NEW BEST!';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1600);
}

// ===== RESET =====
function resetGame() {
  score = 0; hits = 0; combo = 0;
  clearTimeout(comboTimeout);
  document.getElementById('score').textContent = '0';
  document.getElementById('hit-count').textContent = '0';
  hideComboBanner();
  buildStreakDots();
  document.getElementById('tap-hint').style.display = '';
  hideTapHint = false;
}

// ===== EVENT LISTENERS =====
// Mouse click
document.getElementById('game-area').addEventListener('mousedown', e => {
  doHit(e.clientX, e.clientY);
});

// Touch
document.getElementById('game-area').addEventListener('touchstart', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    doHit(t.clientX, t.clientY);
  }
}, { passive: false });

buildStreakDots();
</script>
</body>
</html>
